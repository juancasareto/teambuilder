<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TeamBuilder</title>
    <script>
      // GitHub Pages SPA redirect hack
      // Encodes la ruta actual y redirige al index con el path como query param
      var l = window.location;
      var base = '/teambuilder';
      var path = l.pathname.slice(base.length) || '/';
      l.replace(
        l.protocol + '//' + l.host + base +
        '/?p=' + encodeURIComponent(path + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      );
    </script>
  </head>
  <body></body>
</html>
