<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>TeamBuilder</title>
    <script>
      // GitHub Pages SPA redirect hack
      // Encoda la ruta como query param para que index.html la restaure
      var l = window.location
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
        '/?/' + l.pathname.slice(1).split('/').slice(1).join('/') +
        (l.search ? '&' + l.search.slice(1) : '') + l.hash
      )
    </script>
  </head>
</html>
