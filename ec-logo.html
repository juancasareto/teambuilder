<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0A;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
  }

  .logo {
    font-family: 'Courier New', 'Lucida Console', monospace;
    font-size: 72px;
    line-height: 1.18;
    color: #3ECF8E;
    text-shadow:
      0 0 20px rgba(62, 207, 142, 0.6),
      0 0 60px rgba(62, 207, 142, 0.25),
      0 0 120px rgba(62, 207, 142, 0.1);
    white-space: pre;
    letter-spacing: 0;
  }

  .tagline {
    font-family: 'Courier New', monospace;
    font-size: 22px;
    letter-spacing: 0.35em;
    color: #3ECF8E;
    opacity: 0.5;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">███████╗  ██████╗
██╔════╝ ██╔════╝
█████╗   ██║
██╔══╝   ██║
███████╗ ╚██████╗
╚══════╝  ╚═════╝</div>
    <div class="tagline">Easy Crew AI</div>
  </div>
</body>
</html>
