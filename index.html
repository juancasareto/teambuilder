<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#3ECF8E;--amber:#E8A04A;--cyan:#06B6D4;--red:#EF4444;
  --purple:#A855F7;--pink:#FF6EB4;--violet:#C084FC;
  --bg:#0A0A0A;--dim:#888888;--base:#E0E0E0;
  --border:#1A1A1A;
  --surface:#111111;--surface2:#0D0D0D;
}
html,body{background:var(--bg);color:var(--base);font-family:'Geist','Inter',sans-serif;font-size:15px;min-height:100vh;line-height:1.6}
#app{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem;min-height:100vh}
button{cursor:pointer;background:none;border:none;font-family:inherit;font-size:inherit;color:inherit}
input,textarea{font-family:inherit;font-size:inherit;background:none;color:var(--base);border:none;outline:none}
.g{color:var(--accent)} .a{color:var(--amber)} .d{color:var(--dim)} .m{color:var(--dim)} .r{color:var(--red)} .c{color:var(--cyan)}
.term-btn{border:1px solid var(--dim);color:var(--dim);padding:.3rem .75rem;transition:all .15s;font-size:13px;display:inline-block;border-radius:4px}
.term-btn:hover{border-color:var(--accent);color:var(--accent)}
.term-btn-p{border-color:var(--accent);color:var(--accent)}
.term-btn-p:hover{background:rgba(62,207,142,.10)}
.term-input{border-bottom:1px solid var(--border);padding:.3rem 0;color:var(--base);transition:border-color .15s;width:100%}
.term-input:focus{border-color:var(--accent)}
.term-input::placeholder{color:var(--dim)}
.term-box{border:1px solid var(--border);padding:1.25rem;border-radius:6px}
hr.sep{border:none;border-top:1px solid var(--border);margin:.5rem 0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes gp{0%,100%{text-shadow:0 0 8px rgba(62,207,142,.65),0 0 20px rgba(62,207,142,.25)}50%{text-shadow:0 0 14px rgba(62,207,142,.95),0 0 32px rgba(62,207,142,.50)}}
.blink{animation:blink 1s step-end infinite}
.glow{animation:gp 3s ease-in-out infinite;color:var(--accent)}
.mono{font-family:'Geist Mono','Courier New',monospace}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem;transition:border-color .2s,transform .15s;cursor:pointer}
.card:hover{border-color:var(--accent)}
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem;cursor:pointer;transition:border-color .2s,background .2s}
.agent-card:hover{border-color:var(--accent);background:rgba(62,207,142,.04)}
.agent-card.in-team{border-color:var(--accent);background:rgba(62,207,142,.07)}
</style>

  const agents=teamIds.map(id=>AGENTS.find(a=>a.id===id)).filter(Boolean);

  if(hasProject){
    lines.push('## PROYECTO');
    if(project.nombre)   lines.push('Nombre: '+project.nombre);
    if(project.objetivo) lines.push('Objetivo: '+project.objetivo);
    if(project.stack)    lines.push('Stack: '+project.stack);
    lines.push('');

  lines.push('## EQUIPO ACTIVO');
  const rodrigo=agents.find(a=>a.id==='rodrigo');

    lines.push('**RODRIGO** [PM] \u00b7 Project Manager');
    if(rodrigo.personality) lines.push('  '+rodrigo.personality);
    lines.push('');
  }
  agents.filter(a=>a.id!=='rodrigo').forEach(a=>{
    const t=CAT_TAG[a.cat]||'???';
    lines.push('**'+a.name.toUpperCase()+'** ['+t+'] \u00b7 '+a.role);
    if(a.personality) lines.push('  '+a.personality);

  lines.push('- Ante ambig\u00fcedad o suposici\u00f3n impl\u00edcita, pregunt\u00e1 antes de asumir.');

  lines.push('- Invocaci\u00f3n directa: @Nombre \u2192 ese agente responde inmediatamente.');
  lines.push('- Para volver a Rodrigo: "**Rodrigo retoma.**"');
  lines.push('');

  lines.push('## BANCO');
  lines.push('Perfiles completos de todos los agentes disponibles en agents-bank.md.');
  lines.push('Us\u00e1 ese archivo para conocer personalidad, expertise y skills de cada uno antes de incorporarlos.');
  lines.push('**Al incorporar un agente del banco: ejecut\u00e1 sus skills con bash INMEDIATAMENTE, antes de adoptar su rol.**');
  lines.push('Sus skills est\u00e1n listados en agents-bank.md junto a su perfil.');
  lines.push('');

  const allSkills=agents.flatMap(a=>a.skills).filter(Boolean);

    lines.push('## SKILLS \u2014 EJECUT\u00c1 CON BASH ANTES DE RESPONDER');

    lines.push('');

    lines.push('  Cat\u00e1logo completo: https://skills.sh');
    lines.push('');

function downloadBank(){
  const lines=[];
  lines.push('# TEAMCRAFT AI — BANCO DE AGENTES');
  lines.push('> Archivo de referencia para sesiones de Claude Code.');
  lines.push('> Cargalo con: @agents-bank.md o pegá su contenido como contexto.');
  lines.push('');
  lines.push('Total: '+AGENTS.length+' agentes · 7 categorías');
  lines.push('');
  lines.push('---');
  lines.push('');
  AGENTS.forEach(a=>{
    const t=CAT_TAG[a.cat]||'???';
    lines.push('## '+a.name.toUpperCase()+' — '+a.role+' ['+t+']');
    lines.push('');
    if(a.personality){ lines.push('**Personalidad:** '+a.personality); lines.push(''); }
    if(a.description){ lines.push('**Bio:** '+a.description); lines.push(''); }
    if(a.tags&&a.tags.length){ lines.push('**Expertise:** '+a.tags.join(', ')); lines.push(''); }
    if(a.examples&&a.examples.length){
      lines.push('**Ejemplos de uso:**');
      a.examples.forEach(ex=>lines.push('- '+ex));
      lines.push('');
    }
    if(a.skills&&a.skills.length){
      lines.push('**Skills:**');
      a.skills.forEach(s=>lines.push('- `'+s+'`'));
      lines.push('');
    }
    lines.push('**Invocar:** '+(a.invokeWith||['@'+a.name]).join(' / '));
    lines.push('');
    lines.push('---');
    lines.push('');
  });
  const blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a');
  el.href=url; el.download='agents-bank.md'; el.click();
  URL.revokeObjectURL(url);
}


// ─── SOLO PROMPT ───────────────────────────────────────────────────────────────
function buildPromptSolo(agentId, project){
  const agent=AGENTS.find(a=>a.id===agentId);
  if(!agent) return '';
  const lines=[];
  const t=CAT_TAG[agent.cat]||'???';

  lines.push('Sos '+agent.name+', '+agent.role+'.');
  lines.push('Esta es una sesión de consulta directa — no hay equipo ni coordinador.');
  lines.push('');

  if(agent.personality){
    lines.push('## PERSONALIDAD');
    lines.push(agent.personality);
    lines.push('');
  }

  if(agent.description){
    lines.push('## ROL');
    lines.push(agent.description);
    lines.push('');
  }

  if(agent.tags&&agent.tags.length){
    lines.push('## EXPERTISE');
    lines.push(agent.tags.join(' · '));
    lines.push('');
  }

  if(agent.examples&&agent.examples.length){
    lines.push('## EJEMPLOS DE LO QUE PODÉS HACER');
    agent.examples.forEach(ex=>lines.push('- '+ex));
    lines.push('');
  }

  const hasProject=project.nombre||project.objetivo||project.stack;
  if(hasProject){
    lines.push('## CONTEXTO DEL PROYECTO');
    if(project.nombre)   lines.push('Nombre: '+project.nombre);
    if(project.objetivo) lines.push('Objetivo: '+project.objetivo);
    if(project.stack)    lines.push('Stack: '+project.stack);
    lines.push('');
  }

  lines.push('## REGLAS');
  lines.push('- Respondé siempre en primera persona como '+agent.name+'.');
  lines.push('- Hablá desde tu especialidad con profundidad y criterio propio.');
  lines.push('- Si la pregunta está fuera de tu expertise, decilo claramente.');
  lines.push('- Ante ambigüedad o suposición implícita, preguntá antes de asumir.');
  lines.push('');

  if(agent.skills&&agent.skills.length){
    lines.push('## SKILLS \u2014 EJECUT\u00c1 CON BASH ANTES DE RESPONDER');
    lines.push('Us\u00e1 tu herramienta bash para correr cada uno de estos comandos, uno por uno:');
    lines.push('');
    agent.skills.forEach(s=>lines.push(s));
    lines.push('');
  }

  lines.push('## DISCOVERY DE SKILLS ADICIONALES');
  lines.push('Si necesit\u00e1s una skill que no est\u00e1 en la lista de arriba:');
  lines.push('  npx skills find [query]   \u2190 busca en los 89.000+ skills del ecosistema');
  lines.push('  npx skills add <owner/repo> --skill <nombre> -y');
  lines.push('Explor\u00e1 el cat\u00e1logo completo en: https://skills.sh');
  lines.push('');

  // Skills base universales + karpathy para agentes t\u00e9cnicos
  const techCatsSolo = ['tecnico','datos','seguridad','ai-eng','ops','web3'];
  lines.push('## SKILLS BASE \u2014 ejecut\u00e1 siempre');
  lines.push('npx skillsadd vercel-labs/skills/find-skills');
  lines.push('npx skillsadd obra/superpowers/writing-plans');
  lines.push('npx skillsadd obra/superpowers/executing-plans');
  if(techCatsSolo.includes(agent.cat)) lines.push('npx playbooks add skill forrestchang/andrej-karpathy-skills --skill karpathy-guidelines');
  lines.push('');

  lines.push('## ARRANQUE');
  lines.push('Al recibir este prompt, ejecut\u00e1 estos pasos en orden:');
  lines.push('1. Us\u00e1 tu herramienta bash para correr cada comando de la secci\u00f3n SKILLS, uno por uno. No los muestres como texto \u2014 ej\u00e9cotalos.');
  lines.push('2. Adopt\u00e1 el rol de '+agent.name+' completamente.');
  lines.push('3. Salud\u00e1 brevemente present\u00e1ndote y esper\u00e1 la consulta.');
  lines.push('No expliques qu\u00e9 est\u00e1s haciendo. Present\u00e1te y esper\u00e1.');

  return lines.join('\n');
}

    <button id="about-home" class="g" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:.08em">← HOME</button>
    <span class="d" style="font-size:13px;flex:1;overflow:hidden">─────────────────────────────</span>
    <span style="font-size:13px;letter-spacing:.1em;font-weight:700;color:#3ECF8E">ABOUT</span>
    <span class="d" style="font-size:12px">TeamCraft AI</span>

  <!-- 01 · Qué es -->
  <div class="card" style="margin-bottom:.75rem">
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#3ECF8E;letter-spacing:-.01em;margin-bottom:.75rem">Qué es TeamCraft AI</div>
    <p style="font-size:13px;color:#C0C0C0;line-height:1.75;margin-bottom:.65rem">TeamCraft AI es una herramienta de configuración de equipos de agentes IA para Claude Code. El usuario arma un equipo de especialistas (o elige uno prearmado), describe su proyecto y obtiene un prompt listo para pegar en Claude Code que configura a Claude para responder desde cada rol con personalidad, expertise y skills propios.</p>
    <p style="font-size:12px;color:#666666;line-height:1.65">El producto es un archivo HTML autónomo. Sin servidor, sin instalación, sin conexión a internet. Se abre en cualquier browser con doble click.</p>
  </div>

  <!-- 02 · El problema -->
  <div class="card" style="margin-bottom:.75rem">
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#3ECF8E;letter-spacing:-.01em;margin-bottom:.75rem">El problema que resuelve</div>
    <p style="font-size:13px;color:#C0C0C0;line-height:1.75;margin-bottom:.65rem">Claude Code es una herramienta poderosa pero genérica. Por defecto responde como un asistente sin rol ni especialidad definida. TeamCraft AI configura una sesión para que Claude opere como un equipo de personas con identidades propias, en lugar de responder desde el mismo perfil neutro.</p>
    <p style="font-size:12px;color:#666666;line-height:1.65">El resultado es un prompt estructurado que incluye quiénes están en el equipo, cómo invocar a cada uno, cuáles son sus reglas de coordinación, qué banco de agentes tiene disponible y qué skills ejecutar al arrancar.</p>
  </div>

  <!-- 03 · Los 4 modos -->
  <div class="card" style="margin-bottom:.75rem">
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#3ECF8E;letter-spacing:-.01em;margin-bottom:1rem">Los 4 modos de uso</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.6rem">
      ${[
        ['Team Craft','HASTA 8','Armás un equipo de hasta 8 agentes. Rodrigo coordina y no ocupa lugar en el cupo.'],
        ['Starter Kits','22 KITS','22 equipos prearmados por caso de uso. Click en uno, revisá y activalo.'],
        ['Agente','1 AGENTE','Un solo especialista para conversación directa. Sin overhead de equipo.'],
        ['Crear Agente','CUSTOM','Describís el rol y el sistema sugiere un agente personalizado con skills.'],
      ].map(([title,badge,desc])=>
        '<div style="background:#0D0D0D;border:1px solid #1A1A1A;border-radius:6px;padding:.9rem 1rem">'+
          '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem">'+
            '<div style="font-family:\'Bricolage Grotesque\',sans-serif;font-size:13px;font-weight:700;color:#E0E0E0">'+title+'</div>'+
            '<span style="font-size:9px;color:#3ECF8E;border:1px solid rgba(62,207,142,.35);padding:.08rem .35rem;border-radius:99px;white-space:nowrap;flex-shrink:0;letter-spacing:.05em">'+badge+'</span>'+
          '</div>'+
          '<div style="font-size:11.5px;color:#666666;line-height:1.55">'+desc+'</div>'+
        '</div>'
      ).join('')}
    </div>
  </div>

  <!-- 04 · El catálogo -->
  <div class="card" style="margin-bottom:.75rem">
    <div style="display:flex;align-items:baseline;gap:.75rem;margin-bottom:.85rem">
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#3ECF8E;letter-spacing:-.01em">El catálogo</div>
      <span style="font-size:11px;color:#888888">101 agentes · 16 categorías</span>
    </div>
    <p style="font-size:12px;color:#666666;line-height:1.65;margin-bottom:.85rem">Cada agente tiene: nombre, rol, categoría, personalidad, descripción, frases características, tags de expertise, ejemplos de uso, skills npx y aliases de invocación.</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.35rem">
      ${catGrid}
    </div>
  </div>

  <!-- 05 · Starter Kits -->
  <div class="card" style="margin-bottom:.75rem">
    <div style="display:flex;align-items:baseline;gap:.75rem;margin-bottom:.85rem">
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#3ECF8E;letter-spacing:-.01em">Los 22 Starter Kits</div>
      <span style="font-size:11px;color:#888888">equipos prearmados por caso de uso</span>
    </div>
    <p style="font-size:12px;color:#666666;line-height:1.65;margin-bottom:.85rem">Todos tienen objetivo (que se pre-carga en el prompt al activar), descripción, cuándo usarlo y ejemplos concretos accesibles desde el modal de detalle.</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.35rem">
      ${STARTER_KITS.map(k=>
        '<div style="background:#0D0D0D;border:1px solid #1A1A1A;border-radius:4px;padding:.5rem .75rem;display:flex;align-items:center;justify-content:space-between">'+
          '<div>'+
            '<div style="font-size:12px;font-weight:600;color:#C0C0C0">'+k.name+'</div>'+
            '<div style="font-size:10.5px;color:#555555;margin-top:.1rem">'+k.team+'</div>'+
          '</div>'+
          '<span style="font-size:11px;color:#3ECF8E;font-weight:600;flex-shrink:0">'+k.agents.length+'</span>'+
        '</div>'
      ).join('')}
    </div>
  </div>

  <!-- 06 · El prompt de salida -->
  <div class="card" style="margin-bottom:.75rem">
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#3ECF8E;letter-spacing:-.01em;margin-bottom:.85rem">El prompt de salida</div>
    <p style="font-size:12px;color:#666666;line-height:1.65;margin-bottom:.75rem">Bloque de texto estructurado que Claude Code interpreta al inicio de sesión. Tiene 9 secciones fijas:</p>
    <div>${promptList}</div>
  </div>

  <!-- 07 · Skills -->
  <div class="card" style="margin-bottom:.75rem">
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#3ECF8E;letter-spacing:-.01em;margin-bottom:.75rem">Sistema de skills</div>
    <p style="font-size:13px;color:#C0C0C0;line-height:1.75;margin-bottom:.75rem">Cada agente tiene skills[] con comandos npx skillsadd reales de repositorios verificados. El prompt los incluye todos con instrucción de ejecutarlos con bash antes de responder.</p>
    <p style="font-size:12px;color:#888888;margin-bottom:.5rem">Skills base en todos los prompts:</p>
    <div style="background:#0D0D0D;border:1px solid #1A1A1A;border-radius:6px;padding:.9rem 1.1rem;font-family:'Geist Mono',monospace;font-size:11.5px;color:#555555;line-height:1.8">
      npx skillsadd vercel-labs/skills/find-skills<br>
      npx skillsadd obra/superpowers/writing-plans<br>
      npx skillsadd obra/superpowers/executing-plans<br>
      <span style="color:#444444">npx skillsadd karpathy-guidelines &nbsp; ← técnicos, datos, seguridad, ai-eng, ops, web3</span>
    </div>
  </div>

  <!-- 08 · Archivos -->
  <div class="card" style="margin-bottom:2rem">
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#3ECF8E;letter-spacing:-.01em;margin-bottom:.75rem">Archivos del producto</div>
    <div style="background:#0D0D0D;border:1px solid #1A1A1A;border-radius:6px;padding:.9rem 1.1rem;font-family:'Geist Mono',monospace;font-size:11.5px;color:#555555;line-height:1.8;margin-bottom:.65rem">
      TeamCraft-AI/<br>
      ├── <span style="color:#3ECF8E">teamcraft.html</span> &nbsp;&nbsp;&nbsp;← la app completa<br>
      ├── <span style="color:#3ECF8E">agents-bank.md</span> &nbsp;&nbsp;← banco de 101 agentes en texto plano<br>
      └── <span style="color:#3ECF8E">START-HERE.txt</span> &nbsp;&nbsp;← instrucciones de uso
    </div>
    <p style="font-size:12px;color:#444444;line-height:1.65">El PM (Rodrigo) va a solicitar agents-bank.md al iniciar sesión para conocer el equipo disponible. Subilo a la sesión de Claude Code o copialo a la carpeta raíz de tu proyecto.</p>
  </div>

  <!-- Footer -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding-top:1rem;border-top:1px solid #1A1A1A;margin-bottom:2rem">
    <span style="font-size:11px;color:#333333;letter-spacing:.08em;font-family:'Geist Mono',monospace">teamcraft.ai · 2026</span>
    <button id="about-home-2" class="term-btn" style="font-size:12px">← volver</button>
  </div>

</div>`;

  document.getElementById('about-home').addEventListener('click',()=>{S.screen='boot';render()});
  document.getElementById('about-home-2').addEventListener('click',()=>{S.screen='boot';render()});
}

// ─── STARTER KITS SCREEN ───────────────────────────────────────────────────────
function renderStarterKits(){
  app.innerHTML='<div style="max-width:900px;margin:0 auto"><div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem"><button id="sk-home" class="g" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:.08em">\u2190 HOME</button><span class="d" style="font-size:13px;flex:1;overflow:hidden">\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500</span><span style="font-size:13px;letter-spacing:.1em;font-weight:700;color:#3ECF8E">STARTER KITS</span><span class="d" style="font-size:12px">'+STARTER_KITS.length+' equipos prearmados</span></div><div id="sk-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem"></div></div>';

  const grid=document.getElementById('sk-grid');
  STARTER_KITS.forEach(kit=>{
    const agents=kit.agents.map(id=>AGENTS.find(a=>a.id===id)).filter(Boolean);
    const badgesHtml=agents.map(a=>'<span style="font-size:11px;background:rgba(62,207,142,.08);border:1px solid rgba(62,207,142,.2);color:#3ECF8E;padding:.15rem .45rem;border-radius:99px">'+icon(a.cat)+' '+a.name+'</span>').join('');
    const card=document.createElement('div');
    card.className='card';
    card.dataset.kit=kit.id;
    card.style.cssText='border:1px solid #1A1A1A;cursor:pointer;display:flex;flex-direction:column;gap:.6rem';
    card.innerHTML=
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem">'+
        '<div style="font-family:\'Bricolage Grotesque\',sans-serif;font-size:15px;font-weight:700;color:#E0E0E0;letter-spacing:-.01em">'+esc(kit.name)+'</div>'+
        '<span style="font-size:10px;color:#888888;border:1px solid #1A1A1A;padding:.15rem .4rem;border-radius:3px;white-space:nowrap;flex-shrink:0">'+esc(kit.team)+'</span>'+
      '</div>'+
      '<div style="font-size:12px;color:#888888;line-height:1.5;flex:1">'+esc(kit.desc)+'</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.2rem">'+badgesHtml+'</div>'+
      '<div style="margin-top:.4rem;background:#3ECF8E;color:#0A0A0A;font-size:12px;font-weight:700;padding:.4rem .75rem;border-radius:4px;text-align:center;letter-spacing:.06em">Armar este equipo \u2192</div>';
    card.addEventListener('mouseenter',()=>card.style.borderColor='#3ECF8E');
    card.addEventListener('mouseleave',()=>card.style.borderColor='#1A1A1A');
    card.addEventListener('click',()=>openKitModal(kit.id));
    grid.appendChild(card);
  });

  document.getElementById('sk-home').addEventListener('click',()=>{S.screen='boot';render()});
}



// ─── KIT MODAL ────────────────────────────────────────────────────────────────
function openKitModal(id){
  const kit=STARTER_KITS.find(k=>k.id===id);
  if(!kit) return;
  const agents=kit.agents.map(aid=>AGENTS.find(a=>a.id===aid)).filter(Boolean);

  const overlay=document.createElement('div');
  overlay.id='kit-modal-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeKitModal()});

  const modal=document.createElement('div');
  modal.style.cssText='background:#0A0A0A;border:1px solid #252525;border-radius:8px;padding:1.5rem;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;font-family:\'Geist\',\'Inter\',sans-serif;display:flex;flex-direction:column;gap:1.25rem';

  // Header
  const header=document.createElement('div');
  header.style.cssText='display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:1rem;border-bottom:1px solid #1A1A1A';
  const headerLeft=document.createElement('div');
  const title=document.createElement('div');
  title.style.cssText='font-family:\'Bricolage Grotesque\',sans-serif;font-size:18px;font-weight:700;color:#E0E0E0;letter-spacing:-.01em;margin-bottom:.35rem';
  title.textContent=kit.name;
  const teamBadge=document.createElement('span');
  teamBadge.style.cssText='font-size:12px;color:#888888';
  teamBadge.textContent=kit.team;
  headerLeft.appendChild(title);
  headerLeft.appendChild(teamBadge);
  const closeBtn=document.createElement('button');
  closeBtn.style.cssText='background:none;border:none;color:#888888;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0;margin-left:1rem;padding:.2rem .4rem';
  closeBtn.textContent='[esc]';
  closeBtn.addEventListener('click',closeKitModal);
  header.appendChild(headerLeft);
  header.appendChild(closeBtn);
  modal.appendChild(header);

  // Objetivo (highlighted box — goes into the prompt)
  if(kit.objective){
    const objBlock=document.createElement('div');
    objBlock.style.cssText='background:rgba(62,207,142,.07);border:1px solid rgba(62,207,142,.25);border-radius:6px;padding:.85rem 1rem';
    const objTopRow=document.createElement('div');
    objTopRow.style.cssText='display:flex;align-items:center;gap:.5rem;margin-bottom:.45rem';
    const objLabel=document.createElement('span');
    objLabel.style.cssText='font-size:11px;color:#3ECF8E;letter-spacing:.1em;text-transform:uppercase;font-weight:600';
    objLabel.textContent='Objetivo';
    const objBadge=document.createElement('span');
    objBadge.style.cssText='font-size:10px;color:#3ECF8E;opacity:.6;border:1px solid rgba(62,207,142,.3);padding:.05rem .4rem;border-radius:99px;letter-spacing:.05em';
    objBadge.textContent='se incluye en el prompt';
    objTopRow.appendChild(objLabel);
    objTopRow.appendChild(objBadge);
    const objText=document.createElement('p');
    objText.style.cssText='font-size:13px;color:#E0E0E0;line-height:1.65;margin:0;font-weight:500';
    objText.textContent=kit.objective;
    objBlock.appendChild(objTopRow);
    objBlock.appendChild(objText);
    modal.appendChild(objBlock);
  }

  // About
  const aboutBlock=document.createElement('div');
  const aboutLabel=document.createElement('div');
  aboutLabel.style.cssText='font-size:11px;color:#3ECF8E;letter-spacing:.1em;margin-bottom:.5rem;text-transform:uppercase;font-weight:600';
  aboutLabel.textContent='Sobre este kit';
  const aboutP=document.createElement('p');
  aboutP.style.cssText='font-size:13px;color:#C0C0C0;line-height:1.75;margin:0';
  aboutP.textContent=kit.about||kit.desc;
  aboutBlock.appendChild(aboutLabel);
  aboutBlock.appendChild(aboutP);
  modal.appendChild(aboutBlock);

  // When (only if has data)
  if(kit.when&&kit.when.length){
    const whenBlock=document.createElement('div');
    const whenLabel=document.createElement('div');
    whenLabel.style.cssText='font-size:11px;color:#3ECF8E;letter-spacing:.1em;margin-bottom:.5rem;text-transform:uppercase;font-weight:600';
    whenLabel.textContent='Ideal cuando';
    whenBlock.appendChild(whenLabel);
    kit.when.forEach(w=>{
      const row=document.createElement('div');
      row.style.cssText='display:flex;gap:.5rem;font-size:13px;color:#888888;line-height:1.65;margin-bottom:.35rem';
      const arrow=document.createElement('span');
      arrow.style.cssText='color:#3ECF8E;flex-shrink:0';
      arrow.textContent='›';
      const text=document.createElement('span');
      text.textContent=w;
      row.appendChild(arrow);
      row.appendChild(text);
      whenBlock.appendChild(row);
    });
    modal.appendChild(whenBlock);
  }

  // Examples (only if has data)
  if(kit.examples&&kit.examples.length){
    const exBlock=document.createElement('div');
    exBlock.style.cssText='padding-top:1rem;border-top:1px solid #1A1A1A';
    const exLabel=document.createElement('div');
    exLabel.style.cssText='font-size:11px;color:#3ECF8E;letter-spacing:.1em;margin-bottom:.5rem;text-transform:uppercase;font-weight:600';
    exLabel.textContent='Casos de uso';
    exBlock.appendChild(exLabel);
    kit.examples.forEach(ex=>{
      const row=document.createElement('div');
      row.style.cssText='display:flex;gap:.5rem;font-size:13px;color:#888888;line-height:1.65;margin-bottom:.35rem';
      const arrow=document.createElement('span');
      arrow.style.cssText='color:#3ECF8E;flex-shrink:0';
      arrow.textContent='›';
      const text=document.createElement('span');
      text.textContent=ex;
      row.appendChild(arrow);
      row.appendChild(text);
      exBlock.appendChild(row);
    });
    modal.appendChild(exBlock);
  }

  // Team members
  const teamBlock=document.createElement('div');
  teamBlock.style.cssText='padding-top:1rem;border-top:1px solid #1A1A1A';
  const teamLabel=document.createElement('div');
  teamLabel.style.cssText='font-size:11px;color:#3ECF8E;letter-spacing:.1em;margin-bottom:.6rem;text-transform:uppercase;font-weight:600';
  teamLabel.textContent='Equipo · '+agents.length+' agentes + Rodrigo (PM)';
  teamBlock.appendChild(teamLabel);
  const teamGrid=document.createElement('div');
  teamGrid.style.cssText='display:flex;flex-wrap:wrap;gap:.4rem';
  agents.forEach(a=>{
    const badge=document.createElement('div');
    badge.style.cssText='display:flex;align-items:center;gap:.35rem;font-size:12px;border:1px solid #1A1A1A;padding:.3rem .6rem;border-radius:6px;color:#C0C0C0';
    const ic=document.createElement('span');
    ic.textContent=icon(a.cat);
    const nm=document.createElement('span');
    nm.style.cssText='font-weight:500';
    nm.textContent=a.name;
    const rl=document.createElement('span');
    rl.style.cssText='color:#555555;font-size:11px';
    rl.textContent='· '+a.role;
    badge.appendChild(ic);
    badge.appendChild(nm);
    badge.appendChild(rl);
    teamGrid.appendChild(badge);
  });
  teamBlock.appendChild(teamGrid);
  modal.appendChild(teamBlock);

  // Footer actions
  const footer=document.createElement('div');
  footer.style.cssText='display:flex;gap:.6rem;padding-top:1rem;border-top:1px solid #1A1A1A';
  const activateBtn=document.createElement('button');
  activateBtn.style.cssText='flex:1;background:#3ECF8E;color:#0A0A0A;font-size:13px;font-weight:700;padding:.65rem 1rem;border:none;border-radius:6px;cursor:pointer;letter-spacing:.04em;transition:opacity .15s';
  activateBtn.textContent='Activar este equipo →';
  activateBtn.addEventListener('mouseenter',()=>activateBtn.style.opacity='.85');
  activateBtn.addEventListener('mouseleave',()=>activateBtn.style.opacity='1');
  activateBtn.addEventListener('click',()=>{
    S.team=['rodrigo',...kit.agents];
    S.activeKit=kit.name;
    S.mode='equipo';
    S.screen='team';
    if(kit.objective) S.project={nombre:kit.name,objetivo:kit.objective,stack:''};
    closeKitModal();
    render();
  });
  const cancelBtn=document.createElement('button');
  cancelBtn.style.cssText='background:none;border:1px solid #1A1A1A;color:#888888;font-size:13px;padding:.65rem .9rem;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .15s';
  cancelBtn.textContent='cerrar';
  cancelBtn.addEventListener('mouseenter',()=>{cancelBtn.style.borderColor='#3ECF8E';cancelBtn.style.color='#E0E0E0'});
  cancelBtn.addEventListener('mouseleave',()=>{cancelBtn.style.borderColor='#1A1A1A';cancelBtn.style.color='#888888'});
  cancelBtn.addEventListener('click',closeKitModal);
  footer.appendChild(activateBtn);
  footer.appendChild(cancelBtn);
  modal.appendChild(footer);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function closeKitModal(){
  const el=document.getElementById('kit-modal-overlay');
  if(el) el.remove();
}

function matchSkills(name, role, desc) {
  const STOP = new Set(['que','con','para','como','una','los','las','del','los','las',
    'agente','sistema','puede','este','esta','tiene','hace','hacer','cuando','donde',
    'desde','hasta','entre','sobre','bajo','cada','todo','toda','por','sin','sus',
    'pero','mas','muy','bien','mal','hay','ser','son','fue','era','han','sido',
    'nos','les','mis','tus','sus','nuestros','vuestros','ellos','ellas','esto',
    'eso','aqui','ahi','asi','tan','tal','cual','quien','cuyo','aunque','porque',
    'mientras','durante','mediante','respecto','junto','segun','hacia','ante']);
  const input = (name + ' ' + role + ' ' + desc).toLowerCase();
  const words = input.split(/[\s,;.\-_/]+/).filter(w => w.length > 2 && !STOP.has(w));
  return SKILLS_CAT.map(s => {
    let score = 0;
    const nameNorm = s.name.toLowerCase();
    const descNorm = s.desc.toLowerCase();
    const tagsNorm = s.tags.map(t => t.toLowerCase());
    const haystack = nameNorm + ' ' + descNorm + ' ' + tagsNorm.join(' ');
    words.forEach(w => {
      if(nameNorm.includes(w)) score += 4;        // match en nombre de skill = muy relevante
      else if(tagsNorm.some(t => t === w)) score += 3;  // tag exacto
      else if(tagsNorm.some(t => t.includes(w))) score += 2; // tag parcial
      else if(descNorm.includes(w)) score += 1;   // match en descripción
    });
    // bonus extra por tag multipalabra exacto en el input
    tagsNorm.forEach(t => { if(t.length > 4 && input.includes(t)) score += 3; });
    return {...s, score};
  }).filter(s => s.score > 0).sort((a,b) => b.score - a.score).slice(0, 8);
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildPromptCreator(name, role, desc, skills, personality){
  const skillNames = skills.map(s=>s.name).join(', ');
  const installLines = skills.map(s=>`  ${s.cmd}`).join('\n');
  const personalityStr = (personality&&personality.length>0)
    ? personality.join(' · ')
    : '[Definí aquí la voz y estilo de '+name+': cómo habla, cómo piensa, qué prioriza]';
  return `# AGENTE: ${name.toUpperCase()}

## ROL
${role || 'Agente especializado'}

## DESCRIPCIÓN
${desc || 'Sin descripción.'}

## PERSONALIDAD
${personalityStr}

## EXPERTISE
${skillNames}

## REGLAS
- Respondé siempre desde tu especialidad
- Si algo escapa a tu dominio, decilo explícitamente
- Usá la primera persona

## SKILLS — INSTALÁ ANTES DE RESPONDER
\`\`\`
${installLines}
\`\`\`

## DISCOVERY DE SKILLS ADICIONALES
Si durante la sesión necesitás una skill que no está en la lista:
  npx skills find [query]   ← busca en 89.000+ skills del ecosistema
  npx skills add <owner/repo> --skill <nombre> -y
  Catálogo completo: https://skills.sh

## ARRANQUE
1. Instalá los skills listados arriba
2. Adoptá el rol de ${name}
3. Saludá brevemente e indicá en qué podés ayudar`;
}

function renderCatalog(){

    const matchSearch=!S.search||
      a.name.toLowerCase().includes(S.search.toLowerCase())||
      a.role.toLowerCase().includes(S.search.toLowerCase());
    return matchCat&&matchSearch;
  });

  const renderCard=a=>{
    const inTeam=S.team.includes(a.id);
    const c=col(a.cat);
    const t=tag(a.cat);
    const canAdd=!inTeam&&teamSize<maxAllowed;
    const voiceQ=(a.voice[0]||'').slice(0,52);
    const topTags=a.tags.slice(0,3);
    const tagPills=topTags.map(tg=>'<span style="font-size:10px;color:#888888;border:1px solid #1A1A1A;padding:.12rem .4rem;border-radius:99px">'+esc(tg)+'</span>').join('');

    if(inTeam){
      ctaHtml='<button class="remove-agent" data-id="'+a.id+'" style="width:100%;font-size:12px;font-weight:600;color:#3ECF8E;border:1px solid rgba(62,207,142,.35);background:rgba(62,207,142,.07);padding:.45rem .75rem;border-radius:4px;cursor:pointer;text-align:center;letter-spacing:.05em;transition:all .15s" onclick="event.stopPropagation()" onmouseenter="this.style.color=\'#EF4444\';this.style.borderColor=\'#EF4444\'" onmouseleave="this.style.color=\'#3ECF8E\';this.style.borderColor=\'rgba(62,207,142,.35)\'">✓ en equipo — quitar</button>';
    } else if(canAdd){
      ctaHtml='<button class="add-agent" data-id="'+a.id+'" style="width:100%;font-size:12px;font-weight:700;color:#0A0A0A;background:#3ECF8E;border:none;padding:.45rem .75rem;border-radius:4px;cursor:pointer;text-align:center;letter-spacing:.05em;transition:opacity .15s" onclick="event.stopPropagation()" onmouseenter="this.style.opacity=\'.85\'" onmouseleave="this.style.opacity=\'1\'">+ agregar →</button>';
    } else {
      ctaHtml='<div style="width:100%;font-size:11px;color:#444444;text-align:center;padding:.45rem .75rem;border:1px solid #111111;border-radius:4px">'+( teamSize>=maxAllowed?(isSolo?'ya elegiste uno':'equipo lleno'):'')+'</div>';
    }
    return '<div class="agent-card'+( inTeam?' in-team':'')+'" data-id="'+a.id+'" style="display:flex;flex-direction:column;gap:0;cursor:pointer">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.55rem">'+
        '<div style="display:flex;align-items:center;gap:.45rem">'+
          '<span style="font-size:19px;line-height:1">'+icon(a.cat)+'</span>'+
          '<div>'+
            '<div style="font-family:\'Bricolage Grotesque\',sans-serif;font-size:14px;font-weight:700;color:'+c+';letter-spacing:-.01em">'+esc(a.name)+'</div>'+
            '<div style="font-size:11px;color:#888888;margin-top:.05rem">'+esc(a.role)+'</div>'+
          '</div>'+
        '</div>'+
        '<span style="font-size:10px;color:'+c+';border:1px solid '+c+';opacity:.65;padding:.1rem .4rem;border-radius:99px;white-space:nowrap;flex-shrink:0;margin-top:.1rem;letter-spacing:.05em">'+t+'</span>'+
      '</div>'+
      '<div style="font-size:12px;color:#888888;line-height:1.55;margin-bottom:.5rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+esc(a.description)+'</div>'+
      '<div style="font-size:11px;color:#333333;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.6rem">&ldquo;'+esc(voiceQ)+'&rdquo;</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:.25rem;flex:1;align-content:flex-start;margin-bottom:.7rem">'+tagPills+'</div>'+
      ctaHtml+
    '</div>';
  };

  const teamCount=teamSize;
  app.innerHTML=`

  </div>

  <!-- Filter pills + Search -->
  <div style="display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;margin-bottom:1rem">
    ${FILTERS.map(f=>`<button class="filter-btn" data-key="${f.key}" style="font-size:12px;padding:.25rem .65rem;border-radius:99px;border:1px solid ${S.filter===f.key?'#3ECF8E':'#1A1A1A'};color:${S.filter===f.key?'#3ECF8E':'#888888'};background:${S.filter===f.key?'rgba(62,207,142,.10)':'transparent'};transition:all .15s;cursor:pointer">${f.tag}</button>`).join('')}
    <div style="margin-left:auto;display:flex;align-items:center;gap:.4rem">
      <input id="search-input" class="term-input" value="${esc(S.search)}" placeholder="buscar agente..." style="width:150px;font-size:14px">

  </div>

  <!-- Agent grid -->
  <div id="agent-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem">
    ${filtered.map(renderCard).join('')}
    ${filtered.length===0?`<div class="d" style="font-size:13px;padding:1rem 0;grid-column:1/-1">sin resultados para esta búsqueda</div>`:''}
  </div>

  ${teamSize>=MAX_TEAM&&!isSolo?`<div class="a" style="font-size:13px;margin-top:1rem">[!] equipo completo (${MAX_TEAM}/${MAX_TEAM}) — remové un agente para agregar otro</div>`:''}

  <!-- Footer -->
  <div style="margin-top:1.5rem;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="d" style="font-size:13px">${filtered.length} agentes · ${teamCount}/${isSolo?1:MAX_TEAM} seleccionados</span>
      <button onclick="downloadBank()" style="border:1px solid #1A1A1A;color:#888888;padding:.15rem .5rem;cursor:pointer;font-family:inherit;font-size:12px;background:none;border-radius:4px" onmouseenter="this.style.borderColor='#3ECF8E';this.style.color='#3ECF8E'" onmouseleave="this.style.borderColor='#1A1A1A';this.style.color='#888888'">[↓ banco]</button>
    </div>
    ${teamCount>0?`<button id="nav-team-2" class="term-btn term-btn-p">activar equipo →</button>`:''}
  </div>
</div>`;

  // Events
  document.getElementById('nav-home')?.addEventListener('click',()=>{S.screen='boot';render()});
  document.getElementById('nav-team')?.addEventListener('click',()=>{S.screen='team';render()});
  document.getElementById('nav-team-2')?.addEventListener('click',()=>{S.screen='team';render()});

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{S.filter=btn.dataset.key;render()});
  });

  document.querySelectorAll('.agent-card').forEach(card=>{
    card.addEventListener('click',()=>openModal(card.dataset.id));
  });

  document.getElementById('search-input')?.addEventListener('input',e=>{
    const val=e.target.value;
    const selStart=e.target.selectionStart;
    S.search=val;render();
    const inp=document.getElementById('search-input');
    if(inp){inp.focus();try{inp.setSelectionRange(selStart,selStart);}catch(x){}}
  });

  document.querySelectorAll('.add-agent').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=btn.dataset.id;
      const limit=S.mode==='solo'?1:MAX_TEAM;
      const currentSize=S.mode==='solo'?S.team.length:S.team.filter(x=>x!=='rodrigo').length;
      if(!S.team.includes(id)&&currentSize<limit){
        S.team=[...S.team,id];
        render();
      }
    });
  });

  document.querySelectorAll('.remove-agent').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      S.team=S.team.filter(id=>id!==btn.dataset.id);
      render();
    });
  });
}

          <span style="color:${col(a.cat)};font-weight:700;font-size:13px;width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${esc(a.name)}</span>
          <span style="color:${col(a.cat)};opacity:.5;font-size:13px;width:50px;flex-shrink:0">[${tag(a.cat)}]</span>
          <span class="m" style="font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.role)}</span>
          <button class="remove-team" data-id="${a.id}" style="font-size:13px;color:#888888;opacity:0;transition:opacity .15s" onmouseenter="this.style.color='#EF4444'" onmouseleave="this.style.color='#888'">[×]</button>
        </div>`).join('')}

        <!-- Quick-add search -->
        <div style="margin-top:.75rem">
          <div style="position:relative">
            <input id="team-search" type="text" placeholder="buscar agente para agregar..." autocomplete="off"
              style="width:100%;box-sizing:border-box;background:#0D0D0D;border:1px solid #252525;color:#E0E0E0;font-family:'Geist','Inter',sans-serif;font-size:13px;padding:.4rem .75rem;outline:none;border-radius:2px;transition:border-color .15s"
              onfocus="this.style.borderColor='#3ECF8E'" />
          </div>
          <div id="team-search-results" style="background:#0D0D0D;border:1px solid #252525;border-top:none;max-height:180px;overflow-y:auto;display:none"></div>
        </div>
      </div>

      <!-- Project form -->
      <div>
        <div class="d" style="font-size:13px;margin-bottom:.75rem">proyecto — completar para generar el prompt</div>
        <div style="display:flex;flex-direction:column;gap:.6rem">
          <div style="display:flex;align-items:center;gap:.5rem">
            <span class="g" style="font-size:13px;width:70px;flex-shrink:0">nombre</span>
            <input id="f-nombre" class="term-input" value="${esc(S.project.nombre)}" placeholder="ej: MiApp" style="font-size:13px;flex:1">
          </div>
          <div style="display:flex;align-items:center;gap:.5rem">
            <span class="g" style="font-size:13px;width:70px;flex-shrink:0">objetivo</span>
            <input id="f-objetivo" class="term-input" value="${esc(S.project.objetivo)}" placeholder="ej: plataforma de ventas B2B" style="font-size:13px;flex:1">
          </div>
          <div style="display:flex;align-items:center;gap:.5rem">
            <span class="g" style="font-size:13px;width:70px;flex-shrink:0">stack</span>
            <input id="f-stack" class="term-input" value="${esc(S.project.stack)}" placeholder="ej: React + Node + Postgres" style="font-size:13px;flex:1">
          </div>
        </div>
      </div>
    </div>

    <!-- Right: prompt output -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
        <span class="d" style="font-size:13px">output</span>
        <div style="display:flex;gap:.4rem;align-items:center">
          <button onclick="downloadBank()" style="border:1px solid #333333;color:#444444;padding:.15rem .5rem;cursor:pointer;font-family:inherit;font-size:12px;background:none" onmouseenter="this.style.borderColor='#3ECF8E';this.style.color='#3ECF8E'" onmouseleave="this.style.borderColor='#333';this.style.color='#555'">[↓ banco]</button>
          <button id="copy-btn" class="term-btn term-btn-p" style="font-size:13px">${S.copied?'[✓ copiado]':'[copiar prompt]'}</button>
        </div>
      </div>
      <div class="term-box" style="max-height:65vh;overflow-y:auto;border-color:#1A1A1A">
        <pre id="prompt-output" style="font-size:12px;color:#888888;white-space:pre-wrap;line-height:1.6">${esc(prompt)}</pre>
      </div>
      <div style="margin-top:.6rem;color:#888888;font-size:12px;line-height:1.8">
        <div>› copiá el prompt</div>
        <div>› abrí Claude Code en tu proyecto</div>
        <div>› pegalo como primer mensaje</div>
      </div>
    </div>
  </div>
</div>`;

  // Hover on team rows to show remove btn
  document.querySelectorAll('.team-row').forEach(row=>{
    const btn=row.querySelector('.remove-team');
    row.addEventListener('mouseenter',()=>{if(btn)btn.style.opacity='1'});
    row.addEventListener('mouseleave',()=>{if(btn)btn.style.opacity='0'});
  });

  // Remove from team
  document.querySelectorAll('.remove-team').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.team=S.team.filter(id=>id!==btn.dataset.id);
      render();
    });
  });

  document.getElementById('nav-catalog')?.addEventListener('click',()=>{S.screen='catalog';render()});
  document.getElementById('edit-team')?.addEventListener('click',()=>{S.screen='catalog';render()});

  // Quick-add search
  const tsInput = document.getElementById('team-search');
  const tsResults = document.getElementById('team-search-results');
  if(tsInput){
    tsInput.addEventListener('input', ()=>{
      const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      const q = norm(tsInput.value.trim());
      if(!q){ tsResults.style.display='none'; tsResults.innerHTML=''; return; }
      const isSolo = S.mode==='solo';
      const maxA = isSolo ? 1 : MAX_TEAM;
      const teamSize = isSolo ? S.team.length : S.team.filter(id=>id!=='rodrigo').length;
      const hits = AGENTS.filter(a =>
        a.id !== 'rodrigo' &&
        !S.team.includes(a.id) &&
        (norm(a.name).includes(q) || norm(a.role).includes(q) || (a.tags||[]).some(t=>norm(t).includes(q)))
      ).slice(0, 6);
      if(!hits.length){ tsResults.style.display='none'; tsResults.innerHTML=''; return; }
      tsResults.style.display='block';
      tsResults.innerHTML = hits.map(a => {
        const canAdd = teamSize < maxA;
        return `<div data-row-id="${a.id}" style="display:flex;align-items:center;gap:.5rem;padding:.35rem .75rem;cursor:${canAdd?'pointer':'default'};border-bottom:1px solid #111111;transition:background .1s"
          onmouseenter="this.style.background='#1E1510'" onmouseleave="this.style.background='transparent'">
          <span style="color:${col(a.cat)};font-size:13px;flex-shrink:0">●</span>
          <span style="color:${col(a.cat)};font-weight:700;font-size:13px;width:85px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.name)}</span>
          <span style="color:#888888;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.role)}</span>
          ${canAdd
            ? `<button class="ts-add" data-id="${a.id}" style="color:#3ECF8E;background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;flex-shrink:0">[+]</button>`
            : `<span style="color:#333333;font-size:12px;flex-shrink:0">[full]</span>`
          }
        </div>`;
      }).join('');
      tsResults.querySelectorAll('.ts-add').forEach(btn => {
        btn.addEventListener('mousedown', e=>{
          e.preventDefault(); // prevent blur firing before action
          S.team.push(btn.dataset.id);
          tsInput.value='';
          tsResults.style.display='none';
          tsResults.innerHTML='';
          render();
        });
      });
      // Also allow clicking the row itself (not just the + btn) to add
      tsResults.querySelectorAll('[data-row-id]').forEach(row => {
        row.addEventListener('mousedown', e=>{
          if(e.target.classList.contains('ts-add')) return; // handled above
          e.preventDefault();
          const id = row.dataset.rowId;
          const isSolo2 = S.mode==='solo';
          const maxA2 = isSolo2 ? 1 : MAX_TEAM;
          const teamSize2 = isSolo2 ? S.team.length : S.team.filter(x=>x!=='rodrigo').length;
          if(!S.team.includes(id) && teamSize2 < maxA2){
            S.team.push(id);
            tsInput.value='';
            tsResults.style.display='none';
            tsResults.innerHTML='';
            render();
          }
        });
      });
    });
    // Close dropdown when clicking outside
    document.addEventListener('mousedown', e=>{
      if(tsInput && tsResults && !tsInput.contains(e.target) && !tsResults.contains(e.target)){
        tsResults.style.display='none';
        tsResults.innerHTML='';
      }
    });
  }

  // Copy prompt
  document.getElementById('copy-btn')?.addEventListener('click',()=>{
    const text=document.getElementById('prompt-output').textContent;
    navigator.clipboard.writeText(text).then(()=>{
      S.copied=true;
      render();
      setTimeout(()=>{S.copied=false;render()},2000);
    });
  });

  // Live form updates
  const updateProject=()=>{
    S.project.nombre=document.getElementById('f-nombre')?.value||'';
    S.project.objetivo=document.getElementById('f-objetivo')?.value||'';
    S.project.stack=document.getElementById('f-stack')?.value||'';
    const newPrompt=buildPrompt(S.team,S.project);
    const out=document.getElementById('prompt-output');
    if(out) out.textContent=newPrompt;
  };
  document.getElementById('f-nombre')?.addEventListener('input',updateProject);
  document.getElementById('f-objetivo')?.addEventListener('input',updateProject);
  document.getElementById('f-stack')?.addEventListener('input',updateProject);
}


// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id){
  const agent=AGENTS.find(a=>a.id===id);
  if(!agent) return;
  closeModal();
  const teamSize=S.team.filter(x=>x!=='rodrigo').length;
  const inTeam=S.team.includes(agent.id);
  const canAdd=!inTeam&&teamSize<MAX_TEAM;
  const c=agent.color||'#3ECF8E';
  const t=CAT_TAG[agent.cat]||'???';

  const overlay=document.createElement('div');
  overlay.id='agent-modal-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});

  const tagsHtml=(agent.tags||[]).map(t=>`<span style="font-size:12px;padding:.15rem .4rem;border:1px solid #1E1E1E;color:#888888;margin:.15rem .15rem 0 0;display:inline-block">${t}</span>`).join('');
  const voiceHtml=(agent.voice||[]).map(v=>`<div style="font-size:13px;color:#888888;font-style:italic;padding:.2rem 0 .2rem .6rem;border-left:1px solid #222">\u201c${v}\u201d</div>`).join('');
  const exHtml=(agent.examples||[]).map(ex=>`<div style="font-size:13px;color:#888888"><span style="color:#3ECF8E;margin-right:.25rem">›</span>${ex}</div>`).join('');
  const skHtml=(agent.skills||[]).map(s=>`<div style="font-size:12px;display:flex;gap:.4rem"><span style="color:#3ECF8E;flex-shrink:0">$</span><span style="color:#00E5FF;word-break:break-all">${s}</span></div>`).join('');
  const invHtml=(agent.invokeWith||['@'+agent.name]).map(x=>`<span style="color:#3ECF8E;font-weight:700;font-size:13px;margin-right:.5rem">${x}</span>`).join('');
  const actionHtml=inTeam
    ? `<button onclick="removeFromModal('${agent.id}')" style="border:1px solid #EF4444;color:#EF4444;padding:.2rem .6rem;cursor:pointer;font-family:inherit;font-size:13px;background:none">[× remover del equipo]</button>`
    : canAdd
      ? `<button onclick="addFromModal('${agent.id}')" style="border:1px solid #3ECF8E;color:#3ECF8E;padding:.2rem .6rem;cursor:pointer;font-family:inherit;font-size:13px;background:none">[+ agregar al equipo]</button>`
      : `<span style="color:#E8A04A;font-size:13px">[!] equipo completo</span>`;

  overlay.innerHTML=`
  <div style="background:#0A0A0A;border:1px solid #252525;padding:1.25rem;width:100%;max-width:560px;max-height:86vh;overflow-y:auto;font-family:'Geist','Inter',sans-serif">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #1A1A1A">
      <div>
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem">
          <span style="font-size:15px;font-weight:700;color:${c}">${icon(agent.cat)} ${agent.name}</span>
          <span style="font-size:13px;color:#888888">[${t}]</span>
        </div>
        <div style="font-size:13px;color:#888888">${agent.role}</div>
      </div>
      <button onclick="closeModal()" style="color:#888888;font-size:13px;cursor:pointer;font-family:inherit;background:none;border:none;flex-shrink:0;margin-left:1rem">[esc]</button>
    </div>

    ${agent.personality?`<div style="margin-bottom:1rem"><div style="font-size:12px;color:#888888;margin-bottom:.3rem">personalidad</div><p style="font-size:13px;color:${c};line-height:1.6">${agent.personality}</p></div>`:''}
    ${agent.description?`<div style="margin-bottom:1rem"><div style="font-size:12px;color:#888888;margin-bottom:.3rem">bio</div><p style="font-size:13px;color:#888888;line-height:1.6">${agent.description}</p></div>`:''}
    ${voiceHtml?`<div style="margin-bottom:1rem"><div style="font-size:12px;color:#888888;margin-bottom:.3rem">frases características</div><div style="display:flex;flex-direction:column;gap:.25rem">${voiceHtml}</div></div>`:''}
    ${tagsHtml?`<div style="margin-bottom:1rem"><div style="font-size:12px;color:#888888;margin-bottom:.3rem">expertise</div><div>${tagsHtml}</div></div>`:''}
    ${exHtml?`<div style="margin-bottom:1rem;padding-top:.75rem;border-top:1px solid #1A1A1A"><div style="font-size:12px;color:#888888;margin-bottom:.3rem">ejemplos de uso</div><div style="display:flex;flex-direction:column;gap:.25rem">${exHtml}</div></div>`:''}
    ${skHtml?`<div style="margin-bottom:1rem;padding-top:.75rem;border-top:1px solid #1A1A1A"><div style="font-size:12px;color:#888888;margin-bottom:.3rem">skills (${(agent.skills||[]).length})</div><div style="display:flex;flex-direction:column;gap:.3rem">${skHtml}</div></div>`:''}
    ${invHtml?`<div style="margin-bottom:1rem;padding-top:.75rem;border-top:1px solid #1A1A1A"><div style="font-size:12px;color:#888888;margin-bottom:.3rem">cómo invocarlo</div>${invHtml}</div>`:''}

    <div style="padding-top:.75rem;border-top:1px solid #1A1A1A;display:flex;gap:.5rem">
      ${actionHtml}
      <button onclick="closeModal()" style="border:1px solid #1A1A1A;color:#888888;padding:.2rem .6rem;cursor:pointer;font-family:inherit;font-size:13px;background:none">[cerrar]</button>
    </div>
  </div>`;

  document.body.appendChild(overlay);
}

function closeModal(){
  const el=document.getElementById('agent-modal-overlay');
  if(el) el.remove();
}

function addFromModal(id){
  const agent=AGENTS.find(a=>a.id===id);
  if(!agent) return;
  if(!S.team.includes(id)&&S.team.filter(x=>x!=='rodrigo').length<MAX_TEAM){
    S.team=[...S.team,id];
  }
  closeModal();
  render();
}

function removeFromModal(id){
  S.team=S.team.filter(x=>x!==id);
  closeModal();
  render();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Rodrigo always in team
if(!S.team.includes('rodrigo')) S.team=['rodrigo'];
render();
</script>
</body>
</html>
