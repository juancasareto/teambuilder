<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#00FF41;--amber:#FFB000;--cyan:#00E5FF;--red:#FF3B3B;
  --purple:#A855F7;--pink:#FF6EB4;--violet:#C084FC;
  --bg:#080808;--dim:#444;--muted:#888;--base:#CCCCCC;
  --border:#1A1A1A;--border2:#111;
}
html,body{background:var(--bg);color:var(--base);font-family:'Geist Mono','Courier New',monospace;font-size:12px;min-height:100vh;line-height:1.5}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px)}
#app{max-width:860px;margin:0 auto;padding:2rem 1.25rem;min-height:100vh}
button{cursor:pointer;background:none;border:none;font-family:inherit;font-size:inherit;color:inherit}
input,textarea{font-family:inherit;font-size:inherit;background:none;color:var(--base);border:none;outline:none}
.g{color:var(--green)} .a{color:var(--amber)} .d{color:var(--dim)} .m{color:var(--muted)} .r{color:var(--red)} .c{color:var(--cyan)}
.term-btn{border:1px solid var(--dim);color:var(--muted);padding:.2rem .6rem;transition:all .15s;font-size:11px;display:inline-block}
.term-btn:hover{border-color:var(--green);color:var(--green)}
.term-btn-p{border-color:var(--green);color:var(--green)}
.term-btn-p:hover{background:rgba(0,255,65,.08)}
.term-input{border-bottom:1px solid var(--border);padding:.2rem 0;color:var(--base);transition:border-color .15s;width:100%}
.term-input:focus{border-color:var(--green)}
.term-input::placeholder{color:var(--dim)}
.term-box{border:1px solid var(--border);padding:1rem}
hr.sep{border:none;border-top:1px solid var(--border);margin:.4rem 0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes gp{0%,100%{text-shadow:0 0 8px rgba(0,255,65,.6),0 0 20px rgba(0,255,65,.2)}50%{text-shadow:0 0 14px rgba(0,255,65,.95),0 0 32px rgba(0,255,65,.45)}}
.blink{animation:blink 1s step-end infinite}
.glow{animation:gp 3s ease-in-out infinite;color:var(--green)}
</style>
</head>

// ─── PROMPT BUILDER ────────────────────────────────────────────────────────────
function buildPrompt(teamIds,project){
  const agents=teamIds.map(id=>AGENTS.find(a=>a.id===id)).filter(Boolean);
  const bankAgents=AGENTS.filter(a=>!teamIds.includes(a.id)&&a.id!=='rodrigo');
  const lines=[];

  lines.push('Sos un equipo de agentes IA especializados configurado por TeamBuilder.');
  lines.push('Coordinador permanente: RODRIGO (Project Manager).');
  lines.push('');

  const hasProject=project.nombre||project.objetivo||project.stack;
  if(hasProject){
    lines.push('## PROYECTO');
    if(project.nombre)   lines.push('Nombre: '+project.nombre);
    if(project.objetivo) lines.push('Objetivo: '+project.objetivo);
    if(project.stack)    lines.push('Stack: '+project.stack);
    lines.push('');
  }

  lines.push('## EQUIPO ACTIVO');
  const rodrigo=agents.find(a=>a.id==='rodrigo');
  if(rodrigo){
    lines.push('**RODRIGO** [PM] \u00b7 Project Manager');
    if(rodrigo.personality) lines.push('  '+rodrigo.personality);
    lines.push('');
  }
  agents.filter(a=>a.id!=='rodrigo').forEach(a=>{
    const t=CAT_TAG[a.cat]||'???';
    lines.push('**'+a.name.toUpperCase()+'** ['+t+'] \u00b7 '+a.role);
    if(a.personality) lines.push('  '+a.personality);
    if(a.tags&&a.tags.length) lines.push('  Expertise: '+a.tags.join(', '));
    lines.push('');
  });

  lines.push('## REGLAS');
  lines.push('- Respond\u00e9 siempre desde el agente activo en primera persona.');
  lines.push('- @Nombre invoca a ese agente directamente.');
  lines.push('- Rodrigo coordina y delega \u2014 no ejecuta trabajo t\u00e9cnico.');
  lines.push('- Si la tarea requiere un perfil ausente, Rodrigo lo sugiere del banco antes de intentarlo.');
  lines.push('- Pod\u00e9s incorporar hasta 2 agentes extra mid-sesi\u00f3n (m\u00e1ximo).');
  lines.push('');

  lines.push('## PROTOCOLO DE HANDOFF');
  lines.push('- Rodrigo transfiere: "**[Nombre] toma esto.**" \u2192 el agente responde en primera persona.');
  lines.push('- Invocaci\u00f3n directa: @Nombre \u2192 ese agente responde inmediatamente.');
  lines.push('- Para volver a Rodrigo: "**Rodrigo retoma.**"');
  lines.push('');

  if(bankAgents.length>0){
    lines.push('## BANCO (todos los no seleccionados · mid-sesi\u00f3n, m\u00e1x 2 activos a la vez)');
    lines.push(bankAgents.map(a=>a.name+' \u00b7 '+a.role).join(' | '));
    lines.push('');
  }

  const allSkills=agents.flatMap(a=>a.skills).filter(Boolean);
  if(allSkills.length>0){
    lines.push('## SKILLS \u2014 INSTAL\u00c1 ANTES DE RESPONDER');
    allSkills.slice(0,12).forEach(s=>lines.push('$ '+s));
    lines.push('');
  }

  const teamBlock=[
    rodrigo?'- RODRIGO [PM] \u00b7 Project Manager':'',
    ...agents.filter(a=>a.id!=='rodrigo').map(a=>'- '+a.name+' ['+( CAT_TAG[a.cat]||'???')+'] \u00b7 '+a.role)
  ].filter(Boolean).join('\n');
  const bankBlock=bankAgents.length>0
    ?bankAgents.slice(0,10).map(a=>'- '+a.name+' \u00b7 '+a.role).join('\n')
    :'(ninguno)';

  lines.push('## CLAUDE.md \u2014 ESCRIB\u00cd ESTE ARCHIVO EN LA RA\u00cdZ DEL PROYECTO');
  lines.push('```');
  lines.push('# '+(project.nombre||'PROYECTO'));
  lines.push('> Sesi\u00f3n configurada por TeamBuilder');
  lines.push('');
  lines.push('## PROYECTO');
  if(project.nombre)   lines.push('Nombre: '+project.nombre);
  if(project.objetivo) lines.push('Objetivo: '+project.objetivo);
  if(project.stack)    lines.push('Stack: '+project.stack);
  lines.push('');
  lines.push('## EQUIPO');
  lines.push(teamBlock);
  lines.push('');
  lines.push('## BANCO (no seleccionados — disponibles mid-sesión)');
  lines.push(bankBlock);
  lines.push('');
  lines.push('## REGLAS');
  lines.push('- @Nombre invoca al agente directamente');
  lines.push('- Rodrigo coordina y delega, no ejecuta trabajo t\u00e9cnico');
  lines.push('- M\u00e1ximo 2 agentes adicionales mid-sesi\u00f3n');
  lines.push('```');
  lines.push('');

  lines.push('## ARRANQUE');
  lines.push('Al recibir este prompt:');
  lines.push('1. Instal\u00e1 los skills listados arriba (uno por uno, sin output).');
  lines.push('2. Escrib\u00ed el CLAUDE.md definido arriba en la ra\u00edz del proyecto.');
  lines.push('3. Adopt\u00e1 el rol de Rodrigo.');
  if(!project.stack){
    lines.push('4. Salud\u00e1 y confirm\u00e1 el equipo activo.');
    lines.push('5. Abr\u00ed una ronda de recomendaciones de stack: cada agente relevante opina desde su especialidad y propone herramientas concretas con trade-offs.');
    lines.push('6. Rodrigo consolida y presenta las 2-3 mejores opciones. Esper\u00e1 la decisi\u00f3n antes de continuar.');
  } else {
    lines.push('4. Salud\u00e1, confirm\u00e1 el equipo activo y pregunt\u00e1 por d\u00f3nde arrancamos.');
  }
  lines.push('No expliques qu\u00e9 est\u00e1s haciendo. Ejecut\u00e1 y present\u00e1te.');
  return lines.join('\n');
}


// ─── DOWNLOAD AGENTS BANK ──────────────────────────────────────────────────────
function downloadBank(){
  const lines=[];
  lines.push('# TEAMBUILDER — BANCO DE AGENTES');
  lines.push('> Archivo de referencia para sesiones de Claude Code.');
  lines.push('> Cargalo con: @agents-bank.md o pegá su contenido como contexto.');
  lines.push('');
  lines.push('Total: '+AGENTS.length+' agentes · 7 categorías');
  lines.push('');
  lines.push('---');
  lines.push('');
  AGENTS.forEach(a=>{
    const t=CAT_TAG[a.cat]||'???';
    lines.push('## '+a.name.toUpperCase()+' — '+a.role+' ['+t+']');
    lines.push('');
    if(a.personality){ lines.push('**Personalidad:** '+a.personality); lines.push(''); }
    if(a.description){ lines.push('**Bio:** '+a.description); lines.push(''); }
    if(a.tags&&a.tags.length){ lines.push('**Expertise:** '+a.tags.join(', ')); lines.push(''); }
    if(a.examples&&a.examples.length){
      lines.push('**Ejemplos de uso:**');
      a.examples.forEach(ex=>lines.push('- '+ex));
      lines.push('');
    }
    if(a.skills&&a.skills.length){
      lines.push('**Skills:**');
      a.skills.forEach(s=>lines.push('- `'+s+'`'));
      lines.push('');
    }
    lines.push('**Invocar:** '+(a.invokeWith||['@'+a.name]).join(' / '));
    lines.push('');
    lines.push('---');
    lines.push('');
  });
  const blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a');
  el.href=url; el.download='agents-bank.md'; el.click();
  URL.revokeObjectURL(url);
}

    ${filtered.length===0?`<div class="d" style="font-size:11px;padding:1rem 0">sin resultados</div>`:''}
  </div>

  ${teamSize>=MAX_TEAM?`<div class="a" style="font-size:11px;margin-top:.75rem">[!] equipo completo (${MAX_TEAM}/${MAX_TEAM}) — remové un agente para agregar otro</div>`:''}

  <!-- Footer -->
  <div style="margin-top:1.5rem;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="d" style="font-size:11px">${filtered.length} agentes · ${teamCount}/${MAX_TEAM} seleccionados</span>
      <button onclick="downloadBank()" style="border:1px solid #333;color:#555;padding:.15rem .5rem;cursor:pointer;font-family:inherit;font-size:10px;background:none" onmouseenter="this.style.borderColor='#00FF41';this.style.color='#00FF41'" onmouseleave="this.style.borderColor='#333';this.style.color='#555'">[↓ agents-bank.md]</button>
    </div>
    ${teamCount>0?`<button id="nav-team-2" class="term-btn term-btn-p" style="font-size:11px">generar prompt →</button>`:''}
  </div>
</div>`;

  // Show voice on medium+ screens (we'll just always show them)
  document.querySelectorAll('[id^="voice-"]').forEach(el=>{el.style.display='block'});

  // Hover: show [+add] buttons
  document.querySelectorAll('.agent-row').forEach(row=>{
    const addBtn=row.querySelector('.add-agent');
    if(addBtn){
      row.addEventListener('mouseenter',()=>{addBtn.style.opacity='1'});
      row.addEventListener('mouseleave',()=>{addBtn.style.opacity='0'});
    }
  });

  // Events
  document.getElementById('nav-home')?.addEventListener('click',()=>{S.screen='boot';render()});
  document.getElementById('nav-team')?.addEventListener('click',()=>{S.screen='team';render()});
  document.getElementById('nav-team-2')?.addEventListener('click',()=>{S.screen='team';render()});

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{S.filter=btn.dataset.key;render()});
  });

  document.getElementById('search-input')?.addEventListener('input',e=>{
    S.search=e.target.value;render();
  });

  document.querySelectorAll('.add-agent').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=btn.dataset.id;
      if(!S.team.includes(id)&&S.team.filter(x=>x!=='rodrigo').length<MAX_TEAM){
        S.team=[...S.team,id];
        render();
      }
    });
  });

  document.querySelectorAll('.remove-agent').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      S.team=S.team.filter(id=>id!==btn.dataset.id);
      render();
    });
  });
}

// ─── TEAM SCREEN ──────────────────────────────────────────────────────────────
function renderTeam(){
  const teamAgents=S.team.map(id=>AGENTS.find(a=>a.id===id)).filter(Boolean);
  const prompt=buildPrompt(S.team,S.project);

  if(teamAgents.length===0){
    app.innerHTML=`
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center">
  <div style="text-align:center">
    <div class="d" style="font-size:11px;margin-bottom:.75rem">[!] equipo vacío</div>
    <p class="m" style="font-size:11px;margin-bottom:1rem">Seleccioná agentes en el catálogo.</p>
    <button id="go-catalog" class="term-btn term-btn-p" style="font-size:11px">→ ir al catálogo</button>
  </div>
</div>`;
    document.getElementById('go-catalog').addEventListener('click',()=>{S.screen='catalog';render()});
    return;
  }

  const rodrigo=AGENTS.find(a=>a.id==='rodrigo');
  const others=teamAgents.filter(a=>a.id!=='rodrigo');

  app.innerHTML=`
<div>
  <!-- Header -->
  <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem">
    <button id="nav-catalog" class="d" style="font-size:11px">← /catalogo</button>
    <span class="d" style="font-size:11px">/</span>
    <span class="g" style="font-size:11px">mi-equipo</span>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem">

    <!-- Left: team + form -->
    <div>
      <!-- Team list -->
      <div style="margin-bottom:1.5rem">
        <div class="d" style="font-size:11px;margin-bottom:.5rem">equipo — ${others.length}/${MAX_TEAM}</div>

        <!-- Column headers -->
        <div style="display:flex;align-items:center;gap:.6rem;padding:.2rem 0;color:#333;font-size:10px;border-bottom:1px solid #1A1A1A;margin-bottom:.2rem">
          <span style="width:14px;flex-shrink:0"> </span>
          <span style="width:90px;flex-shrink:0">NAME</span>
          <span style="width:50px;flex-shrink:0">CAT</span>
          <span style="flex:1">ROLE</span>
        </div>

        <!-- Rodrigo row (fixed) -->
        ${rodrigo?`<div style="display:flex;align-items:center;gap:.6rem;padding:.35rem 0;border-bottom:1px solid #0F0F0F">
          <span style="color:${col(rodrigo.cat)};font-size:11px;width:14px;flex-shrink:0">●</span>
          <span style="color:${col(rodrigo.cat)};font-weight:700;font-size:11px;width:90px;flex-shrink:0">${esc(rodrigo.name)}</span>
          <span style="color:${col(rodrigo.cat)};opacity:.5;font-size:11px;width:50px;flex-shrink:0">[PM]</span>
          <span class="m" style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(rodrigo.role)}</span>
        </div>`:''}

        <!-- Other agents -->
        ${others.map(a=>`<div style="display:flex;align-items:center;gap:.6rem;padding:.35rem 0;border-bottom:1px solid #0F0F0F" class="team-row">
          <span style="color:${col(a.cat)};font-size:11px;width:14px;flex-shrink:0">●</span>
          <span style="color:${col(a.cat)};font-weight:700;font-size:11px;width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${esc(a.name)}</span>
          <span style="color:${col(a.cat)};opacity:.5;font-size:11px;width:50px;flex-shrink:0">[${tag(a.cat)}]</span>
          <span class="m" style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.role)}</span>
          <button class="remove-team" data-id="${a.id}" style="font-size:11px;color:#444;opacity:0;transition:opacity .15s" onmouseenter="this.style.color='#FF3B3B'" onmouseleave="this.style.color='#444'">[×]</button>
        </div>`).join('')}

        <div style="margin-top:.75rem">
          <button id="edit-team" class="term-btn" style="font-size:11px">+ editar equipo</button>
        </div>
      </div>

      <!-- Project form -->
      <div>
        <div class="d" style="font-size:11px;margin-bottom:.75rem">proyecto — completar para generar el prompt</div>
        <div style="display:flex;flex-direction:column;gap:.6rem">
          <div style="display:flex;align-items:center;gap:.5rem">
            <span class="g" style="font-size:11px;width:70px;flex-shrink:0">nombre</span>
            <input id="f-nombre" class="term-input" value="${esc(S.project.nombre)}" placeholder="ej: MiApp" style="font-size:11px;flex:1">
          </div>
          <div style="display:flex;align-items:center;gap:.5rem">
            <span class="g" style="font-size:11px;width:70px;flex-shrink:0">objetivo</span>
            <input id="f-objetivo" class="term-input" value="${esc(S.project.objetivo)}" placeholder="ej: plataforma de ventas B2B" style="font-size:11px;flex:1">
          </div>
          <div style="display:flex;align-items:center;gap:.5rem">
            <span class="g" style="font-size:11px;width:70px;flex-shrink:0">stack</span>
            <input id="f-stack" class="term-input" value="${esc(S.project.stack)}" placeholder="ej: React + Node + Postgres" style="font-size:11px;flex:1">
          </div>
        </div>
      </div>
    </div>

    <!-- Right: prompt output -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
        <span class="d" style="font-size:11px">output</span>
        <button id="copy-btn" class="term-btn term-btn-p" style="font-size:11px">${S.copied?'[✓ copiado]':'[copiar prompt]'}</button>
      </div>
      <div class="term-box" style="max-height:65vh;overflow-y:auto;border-color:#1A1A1A">
        <pre id="prompt-output" style="font-size:10px;color:#888;white-space:pre-wrap;line-height:1.6">${esc(prompt)}</pre>
      </div>
      <div style="margin-top:.6rem;color:#444;font-size:10px;line-height:1.8">
        <div>› copiá el prompt</div>
        <div>› abrí Claude Code en tu proyecto</div>
        <div>› pegalo como primer mensaje</div>
      </div>
    </div>
  </div>
</div>`;

  // Hover on team rows to show remove btn
  document.querySelectorAll('.team-row').forEach(row=>{
    const btn=row.querySelector('.remove-team');
    row.addEventListener('mouseenter',()=>{if(btn)btn.style.opacity='1'});
    row.addEventListener('mouseleave',()=>{if(btn)btn.style.opacity='0'});
  });

  // Remove from team
  document.querySelectorAll('.remove-team').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.team=S.team.filter(id=>id!==btn.dataset.id);
      render();
    });
  });

  document.getElementById('nav-catalog')?.addEventListener('click',()=>{S.screen='catalog';render()});
  document.getElementById('edit-team')?.addEventListener('click',()=>{S.screen='catalog';render()});

  // Copy prompt
  document.getElementById('copy-btn')?.addEventListener('click',()=>{
    const text=document.getElementById('prompt-output').textContent;
    navigator.clipboard.writeText(text).then(()=>{
      S.copied=true;
      render();
      setTimeout(()=>{S.copied=false;render()},2000);
    });
  });

  // Live form updates
  const updateProject=()=>{
    S.project.nombre=document.getElementById('f-nombre')?.value||'';
    S.project.objetivo=document.getElementById('f-objetivo')?.value||'';
    S.project.stack=document.getElementById('f-stack')?.value||'';
    const newPrompt=buildPrompt(S.team,S.project);
    const out=document.getElementById('prompt-output');
    if(out) out.textContent=newPrompt;
  };
  document.getElementById('f-nombre')?.addEventListener('input',updateProject);
  document.getElementById('f-objetivo')?.addEventListener('input',updateProject);
  document.getElementById('f-stack')?.addEventListener('input',updateProject);
}


// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id){
  const agent=AGENTS.find(a=>a.id===id);
  if(!agent) return;
  closeModal();
  const teamSize=S.team.filter(x=>x!=='rodrigo').length;
  const inTeam=S.team.includes(agent.id);
  const canAdd=!inTeam&&teamSize<MAX_TEAM;
  const c=agent.color||'#00FF41';
  const t=CAT_TAG[agent.cat]||'???';

  const overlay=document.createElement('div');
  overlay.id='agent-modal-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(8,8,8,0.94);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});

  const tagsHtml=(agent.tags||[]).map(t=>`<span style="font-size:10px;padding:.15rem .4rem;border:1px solid #1E1E1E;color:#444;margin:.15rem .15rem 0 0;display:inline-block">${t}</span>`).join('');
  const voiceHtml=(agent.voice||[]).map(v=>`<div style="font-size:11px;color:#888;font-style:italic;padding:.2rem 0 .2rem .6rem;border-left:1px solid #222">\u201c${v}\u201d</div>`).join('');
  const exHtml=(agent.examples||[]).map(ex=>`<div style="font-size:11px;color:#888"><span style="color:#00FF41;margin-right:.25rem">›</span>${ex}</div>`).join('');
  const skHtml=(agent.skills||[]).map(s=>`<div style="font-size:10px;display:flex;gap:.4rem"><span style="color:#00FF41;flex-shrink:0">$</span><span style="color:#00E5FF;word-break:break-all">${s}</span></div>`).join('');
  const invHtml=(agent.invokeWith||['@'+agent.name]).map(x=>`<span style="color:#00FF41;font-weight:700;font-size:11px;margin-right:.5rem">${x}</span>`).join('');
  const actionHtml=inTeam
    ? `<button onclick="removeFromModal('${agent.id}')" style="border:1px solid #FF3B3B;color:#FF3B3B;padding:.2rem .6rem;cursor:pointer;font-family:inherit;font-size:11px;background:none">[× remover del equipo]</button>`
    : canAdd
      ? `<button onclick="addFromModal('${agent.id}')" style="border:1px solid #00FF41;color:#00FF41;padding:.2rem .6rem;cursor:pointer;font-family:inherit;font-size:11px;background:none">[+ agregar al equipo]</button>`
      : `<span style="color:#FFB000;font-size:11px">[!] equipo completo</span>`;

  overlay.innerHTML=`
  <div style="background:#080808;border:1px solid #2A2A2A;padding:1.25rem;width:100%;max-width:560px;max-height:86vh;overflow-y:auto;font-family:'Geist Mono',monospace">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #1A1A1A">
      <div>
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem">
          <span style="font-size:13px;font-weight:700;color:${c}">${agent.emoji} ${agent.name}</span>
          <span style="font-size:11px;color:#444">[${t}]</span>
        </div>
        <div style="font-size:11px;color:#888">${agent.role}</div>
      </div>
      <button onclick="closeModal()" style="color:#444;font-size:11px;cursor:pointer;font-family:inherit;background:none;border:none;flex-shrink:0;margin-left:1rem">[esc]</button>
    </div>

    ${agent.personality?`<div style="margin-bottom:1rem"><div style="font-size:10px;color:#444;margin-bottom:.3rem">personalidad</div><p style="font-size:11px;color:${c};line-height:1.6">${agent.personality}</p></div>`:''}
    ${agent.description?`<div style="margin-bottom:1rem"><div style="font-size:10px;color:#444;margin-bottom:.3rem">bio</div><p style="font-size:11px;color:#888;line-height:1.6">${agent.description}</p></div>`:''}
    ${voiceHtml?`<div style="margin-bottom:1rem"><div style="font-size:10px;color:#444;margin-bottom:.3rem">frases características</div><div style="display:flex;flex-direction:column;gap:.25rem">${voiceHtml}</div></div>`:''}
    ${tagsHtml?`<div style="margin-bottom:1rem"><div style="font-size:10px;color:#444;margin-bottom:.3rem">expertise</div><div>${tagsHtml}</div></div>`:''}
    ${exHtml?`<div style="margin-bottom:1rem;padding-top:.75rem;border-top:1px solid #1A1A1A"><div style="font-size:10px;color:#444;margin-bottom:.3rem">ejemplos de uso</div><div style="display:flex;flex-direction:column;gap:.25rem">${exHtml}</div></div>`:''}
    ${skHtml?`<div style="margin-bottom:1rem;padding-top:.75rem;border-top:1px solid #1A1A1A"><div style="font-size:10px;color:#444;margin-bottom:.3rem">skills (${(agent.skills||[]).length})</div><div style="display:flex;flex-direction:column;gap:.3rem">${skHtml}</div></div>`:''}
    ${invHtml?`<div style="margin-bottom:1rem;padding-top:.75rem;border-top:1px solid #1A1A1A"><div style="font-size:10px;color:#444;margin-bottom:.3rem">cómo invocarlo</div>${invHtml}</div>`:''}

    <div style="padding-top:.75rem;border-top:1px solid #1A1A1A;display:flex;gap:.5rem">
      ${actionHtml}
      <button onclick="closeModal()" style="border:1px solid #333;color:#666;padding:.2rem .6rem;cursor:pointer;font-family:inherit;font-size:11px;background:none">[cerrar]</button>
    </div>
  </div>`;

  document.body.appendChild(overlay);
}

function closeModal(){
  const el=document.getElementById('agent-modal-overlay');
  if(el) el.remove();
}

function addFromModal(id){
  const agent=AGENTS.find(a=>a.id===id);
  if(!agent) return;
  if(!S.team.includes(id)&&S.team.filter(x=>x!=='rodrigo').length<MAX_TEAM){
    S.team=[...S.team,id];
  }
  closeModal();
  render();
}

function removeFromModal(id){
  S.team=S.team.filter(x=>x!==id);
  closeModal();
  render();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Rodrigo always in team
if(!S.team.includes('rodrigo')) S.team=['rodrigo'];
render();
</script>
</body>
</html>
